version: '3.9'
services:
  democratic-linux:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - vm-data:/app/vm
    devices:
      # Pass through /dev/kvm for hardware acceleration if available (Linux only).
      - /dev/kvm:/dev/kvm
    restart: unless-stopped
    environment:
      - PORT=3000
      - QEMU_MEM=256M
      - QEMU_CPUS=1

volumes:
  vm-data:
