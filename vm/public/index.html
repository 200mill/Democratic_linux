<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Democratic Linux</title>

  <!-- xterm.js from CDN -->
  <link  rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Top bar ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 16px;
      background: #161616;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
      user-select: none;
    }

    #topbar .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #3a3a3a;
      transition: background 0.3s;
    }
    #topbar .dot.online  { background: #4caf50; box-shadow: 0 0 6px #4caf5088; }
    #topbar .dot.offline { background: #f44336; box-shadow: 0 0 6px #f4433688; }
    #topbar .dot.resetting { background: #ff9800; box-shadow: 0 0 6px #ff980088; }

    #topbar h1 {
      font-size: 14px;
      font-weight: 700;
      color: #e0e0e0;
      letter-spacing: 0.05em;
    }

    #topbar .badge {
      margin-left: auto;
      font-size: 11px;
      color: #888;
    }

    #status-text {
      font-size: 11px;
      color: #888;
    }

    /* ── Terminal wrapper ── */
    #terminal-wrapper {
      flex: 1;
      overflow: hidden;
      padding: 4px 4px 4px 4px;
    }

    #terminal {
      width: 100%;
      height: 100%;
    }

    /* ── Connection overlay ── */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 100;
      transition: opacity 0.4s;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }

    #overlay .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333;
      border-top-color: #4caf50;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #overlay p {
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- Loading overlay -->
  <div id="overlay">
    <div class="spinner"></div>
    <p id="overlay-text">Connecting to Democratic Linux…</p>
  </div>

  <!-- Top bar -->
  <div id="topbar">
    <div class="dot" id="status-dot"></div>
    <h1>Democratic Linux</h1>
    <span id="status-text">Connecting…</span>
    <span class="badge" id="badge"></span>
  </div>

  <!-- xterm.js terminal -->
  <div id="terminal-wrapper">
    <div id="terminal"></div>
  </div>

<script>
(function () {
  'use strict';

  // ── Terminal setup ─────────────────────────────────────────────────────────

  const term = new Terminal({
    cursorBlink: true,
    fontSize: 14,
    fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace",
    theme: {
      background:   '#0d0d0d',
      foreground:   '#e0e0e0',
      cursor:       '#e0e0e0',
      selectionBackground: '#ffffff30',
      black:        '#1e1e1e',
      red:          '#f44336',
      green:        '#4caf50',
      yellow:       '#ffeb3b',
      blue:         '#2196f3',
      magenta:      '#9c27b0',
      cyan:         '#00bcd4',
      white:        '#e0e0e0',
      brightBlack:  '#555555',
      brightRed:    '#ef9a9a',
      brightGreen:  '#a5d6a7',
      brightYellow: '#fff59d',
      brightBlue:   '#90caf9',
      brightMagenta:'#ce93d8',
      brightCyan:   '#80deea',
      brightWhite:  '#ffffff',
    },
    scrollback: 5000,
    allowProposedApi: true,
  });

  const fitAddon      = new FitAddon.FitAddon();
  const webLinksAddon = new WebLinksAddon.WebLinksAddon();
  term.loadAddon(fitAddon);
  term.loadAddon(webLinksAddon);
  term.open(document.getElementById('terminal'));
  fitAddon.fit();

  window.addEventListener('resize', () => fitAddon.fit());

  // ── UI helpers ─────────────────────────────────────────────────────────────

  const dot        = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const badge      = document.getElementById('badge');
  const overlay    = document.getElementById('overlay');
  const overlayTxt = document.getElementById('overlay-text');

  function setStatus(state, text) {
    dot.className = 'dot ' + state;
    statusText.textContent = text;
  }

  function hideOverlay() {
    overlay.classList.add('hidden');
  }

  function showOverlay(text) {
    overlayTxt.textContent = text;
    overlay.classList.remove('hidden');
  }

  // ── WebSocket ──────────────────────────────────────────────────────────────

  const WS_URL = (location.protocol === 'https:' ? 'wss://' : 'ws://') +
                  location.host + '/ws';

  let ws = null;
  let reconnectTimer = null;
  let reconnectDelay = 1000;

  function connect() {
    setStatus('offline', 'Connecting…');
    ws = new WebSocket(WS_URL);

    ws.addEventListener('open', () => {
      reconnectDelay = 1000;
      setStatus('online', 'Connected');
      hideOverlay();
      // Send initial terminal size.
      sendResize();
    });

    ws.addEventListener('message', (ev) => {
      let msg;
      try { msg = JSON.parse(ev.data); } catch { return; }

      if (msg.type === 'output') {
        // Base64-encoded bytes from the VM.
        const raw = atob(msg.data);
        const bytes = new Uint8Array(raw.length);
        for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
        term.write(bytes);
      } else if (msg.type === 'info') {
        term.write(msg.text);
      }
    });

    ws.addEventListener('close', () => {
      setStatus('offline', 'Disconnected – reconnecting…');
      showOverlay('Connection lost. Reconnecting…');
      scheduleReconnect();
    });

    ws.addEventListener('error', () => {
      // 'close' will fire right after, so we just let that handler deal with it.
    });
  }

  function scheduleReconnect() {
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(() => {
      reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
      connect();
    }, reconnectDelay);
  }

  // ── Input ──────────────────────────────────────────────────────────────────

  term.onData((data) => {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'input', data }));
  });

  // ── Resize ─────────────────────────────────────────────────────────────────

  term.onResize(({ cols, rows }) => sendResize(cols, rows));

  function sendResize(cols, rows) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const c = cols || term.cols;
    const r = rows || term.rows;
    ws.send(JSON.stringify({ type: 'resize', cols: c, rows: r }));
  }

  // ── Start ──────────────────────────────────────────────────────────────────

  connect();
  term.focus();

})();
</script>
</body>
</html>
